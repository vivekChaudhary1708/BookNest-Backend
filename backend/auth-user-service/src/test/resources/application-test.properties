# Isolated test configuration
spring.application.name=auth-user-service-test

# Disable MongoDB auto-configuration or connect to a safe dummy
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.mongo.MongoAutoConfiguration,org.springframework.boot.autoconfigure.data.mongo.MongoDataAutoConfiguration

# Dummy JWT configuration for tests
jwt.secret=DummySecretKeyForTestingWhichIsLongEnoughToSatisfyHMACSHA256Requirement
jwt.expiration=3600000

# Embedded web server port
server.port=0
