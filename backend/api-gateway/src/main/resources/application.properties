spring.application.name=api-gateway
#Service ka naam

server.port=8080
#Gateway is port pe chalega

eureka.client.service-url.defaultZone=http://localhost:8761/eureka
#Discovery server ka address

# --- Gateway routes (Spring Cloud Gateway Server WebMVC) ---
# Forward requests to services registered in Eureka.
spring.cloud.gateway.server.webmvc.routes[0].id=auth-user-service
spring.cloud.gateway.server.webmvc.routes[0].uri=lb://auth-user-service
spring.cloud.gateway.server.webmvc.routes[0].predicates[0]=Path=/auth/**

spring.cloud.gateway.server.webmvc.routes[1].id=product-service
spring.cloud.gateway.server.webmvc.routes[1].uri=lb://product-service
spring.cloud.gateway.server.webmvc.routes[1].predicates[0]=Path=/products/**

spring.cloud.gateway.server.webmvc.routes[2].id=cart-service
spring.cloud.gateway.server.webmvc.routes[2].uri=lb://cart-service
spring.cloud.gateway.server.webmvc.routes[2].predicates[0]=Path=/cart/**

spring.cloud.gateway.server.webmvc.routes[3].id=order-service
spring.cloud.gateway.server.webmvc.routes[3].uri=lb://order-service
spring.cloud.gateway.server.webmvc.routes[3].predicates[0]=Path=/orders/**

spring.cloud.gateway.server.webmvc.routes[4].id=wishlist-service
spring.cloud.gateway.server.webmvc.routes[4].uri=lb://wishlist-service
spring.cloud.gateway.server.webmvc.routes[4].predicates[0]=Path=/wishlist/**

spring.cloud.gateway.server.webmvc.routes[5].id=review-service
spring.cloud.gateway.server.webmvc.routes[5].uri=lb://review-service
spring.cloud.gateway.server.webmvc.routes[5].predicates[0]=Path=/reviews/**

spring.cloud.gateway.server.webmvc.routes[6].id=notification-service
spring.cloud.gateway.server.webmvc.routes[6].uri=lb://notification-service
spring.cloud.gateway.server.webmvc.routes[6].predicates[0]=Path=/notifications/**

# CORS is configured via `com.booknest.apigateway.config.CorsConfig`